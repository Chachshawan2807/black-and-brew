<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f5e8" />
    <title>BLACKANDBREW — Offline</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f5e8;
        --fg: #161614;
        --muted: #5c5a52;
        --border: #d8d4c4;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --bg: #161614;
          --fg: #f7f5e8;
          --muted: #a8a69c;
          --border: #3a3834;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: max(1.5rem, env(safe-area-inset-top)) 1.5rem
          max(1.5rem, env(safe-area-inset-bottom));
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--fg);
        text-align: center;
      }
      main {
        width: min(100%, 22rem);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 1.5rem;
        background: color-mix(in srgb, var(--bg) 92%, var(--fg));
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.125rem;
        letter-spacing: 0.04em;
      }
      p {
        margin: 0 0 0.5rem;
        line-height: 1.5;
        color: var(--muted);
        font-size: 0.95rem;
      }
      button {
        margin-top: 1rem;
        width: 100%;
        min-height: 2.75rem;
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        background: var(--fg);
        color: var(--bg);
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        touch-action: manipulation;
      }
      button:active {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>BLACKANDBREW</h1>
      <p>ไม่มีการเชื่อมต่ออินเทอร์เน็ต</p>
      <p>No internet connection</p>
      <p>ข้อมูลที่แก้ไขขณะออฟไลน์จะซิงก์เมื่อกลับมาออนไลน์</p>
      <button type="button" id="retry">ลองอีกครั้ง / Retry</button>
    </main>
    <script>
      document.getElementById('retry').addEventListener('click', function () {
        location.reload();
      });
      window.addEventListener('online', function () {
        location.reload();
      });
    </script>
  </body>
</html>
